<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in · Wanderlore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..600&family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="auth">
    <!-- ART PANEL -->
    <aside class="auth-art">
      <a href="/" class="brand">
        <svg class="compass" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="24" cy="24" r="21" stroke="currentColor" stroke-width="2"/>
          <polygon points="24,9 28,24 24,39 20,24" fill="currentColor"/>
          <polygon points="9,24 24,20 39,24 24,28" fill="currentColor" opacity="0.5"/>
          <circle cx="24" cy="24" r="2.5" fill="#17332d"/>
        </svg>
        <span class="word">Wanderlore</span>
      </a>
      <div class="dashed spin-slow"></div>
      <div class="dashed two"></div>
      <p class="art-headline">Every place has a story.<br>Let's go find yours.</p>
      <div class="art-foot">
        <span>BOARDING · CULTURE CLASS</span>
        <span>SEAT 3A · WINDOW</span>
      </div>
    </aside>

    <!-- FORM PANEL -->
    <section class="auth-form-wrap">
      <div class="auth-card">
        <div class="kicker mono" id="kicker">Welcome back, traveler</div>
        <h1 id="title">Sign in to Wanderlore</h1>
        <p class="sub" id="subtitle">Pick up your journeys where you left off.</p>

        <button class="google-btn" id="google-btn" type="button">
          <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          Continue with Google
        </button>

        <div class="divider"><span>or with email</span></div>

        <form id="auth-form">
          <div class="field hidden" id="name-field">
            <label for="name">Name</label>
            <input id="name" type="text" autocomplete="name" placeholder="Your name" />
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input id="email" type="email" autocomplete="email" required placeholder="you@example.com" />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input id="password" type="password" autocomplete="current-password" required minlength="6" placeholder="At least 6 characters" />
          </div>
          <button class="btn btn-primary auth-submit" id="submit-btn" type="submit">Sign in</button>
          <div class="auth-error" id="error"></div>
        </form>

        <p class="auth-toggle" id="toggle-line">
          New to Wanderlore? <button id="toggle-btn" type="button">Create an account</button>
        </p>
        <p class="auth-note mono">Secured by Firebase Authentication</p>
      </div>
    </section>
  </main>
  <script type="module" src="/auth.js"></script>
</body>
</html>
